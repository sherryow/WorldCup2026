<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Syndicate Dashboard 2026</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .rules-bar { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 25px; display: flex; flex-wrap: wrap; justify-content: space-around; gap: 15px; font-size: 13px; font-weight: 600; color: #555; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .rules-bar span { background: #e2e8f0; padding: 3px 8px; border-radius: 4px; color: #1e3c72; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); padding: 20px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #edf2f7; text-align: left; }
        .total-pts { font-weight: bold; color: #1e3c72; }
        .team-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin: 2px; background: #f1f5f9; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>🏆 World Cup Syndicate Dashboard</h1></header>
    <div class="rules-bar">
        <div>Win: <span>3 pts</span></div>
        <div>Draw: <span>1 pt</span></div>
        <div>3+ Goal Win: <span>+2 pts</span></div>
        <div>Knockout Qual: <span>+5 pts</span></div>
        <div>Quarter-Final: <span>+10 pts</span></div>
        <div>Semi-Final: <span>+15 pts</span></div>
        <div>Finals: <span>+20 pts</span></div>
        <div>Champion: <span>+30 pts</span></div>
    </div>

    <div class="card">
        <h2>Current Standings</h2>
        <table>
            <thead><tr><th>Rank</th><th>Participant</th><th>Squad</th><th>Bonus</th><th>Total Pts</th></tr></thead>
            <tbody id="leaderboard-rows"><tr><td colspan="5">Syncing...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
const participants = [
    { name: "Ina", teams: ["France", "Mexico", "Canada", "Haiti"] },
    { name: "Donnacha", teams: ["Spain", "USA", "Australia"] },
    { name: "Matt", teams: ["Argentina", "Iran", "Japan", "Curaçao"] },
    { name: "Oisin", teams: ["England", "South Korea", "Saudi Arabia"] },
    { name: "Josh", teams: ["Portugal", "Qatar", "Uzbekistan", "Jordan"] },
    { name: "Conor", teams: ["Brazil", "Iraq", "Algeria"] },
    { name: "Dylan", teams: ["Netherlands", "Tunisia", "Panama", "Cabo Verde"] },
    { name: "Ella", teams: ["Morocco", "Ecuador", "Paraguay"] },
    { name: "Kate", teams: ["Belgium", "Uruguay", "New Zealand", "Congo DR"] },
    { name: "Barry", teams: ["Germany", "Austria", "Bosnia and Herzegovina"] },
    { name: "Sue", teams: ["Croatia", "Czechia", "Norway"] },
    { name: "Owen", teams: ["Colombia", "Scotland", "Sweden"] },
    { name: "Brian", teams: ["France", "Switzerland", "Türkiye"] },
    { name: "Paula", teams: ["Spain", "Senegal", "Egypt"] },
    { name: "Marie", teams: ["Argentina", "Ghana", "Côte d'Ivoire"] },
    { name: "Johnny", teams: ["England", "South Africa", "Ecuador"] },
    { name: "Dee", teams: ["Portugal", "South Africa", "Panama", "Saudi Arabia"] }
];

const bonuses = {
    knockoutQual: [], quarterFinalists: [], semiFinalists: [], finalists: [], champion: "",
};

const sheetUrl = "https://docs.google.com/spreadsheets/d/1AzxpmFSdefQyGP1zvc53H0jRPG7yW27PEDZ7Bt6CRaA/edit?usp=drivesdk";

function loadSheetsData() {
    const matchesId = sheetUrl.match(/[-\w]{25,}/);
    const script = document.createElement('script');
    script.src = `https://docs.google.com/spreadsheets/d/${matchesId[0]}/gviz/tq?tqx=responseHandler:processData`;
    document.body.appendChild(script);
}

window.processData = function(response) {
    let teamStats = {};
    participants.forEach(p => p.teams.forEach(t => teamStats[t] = { wins: 0, draws: 0, history: [] }));

    response.table.rows.forEach(row => {
        if (!row.c[0]) return;
        const home = row.c[0].v, away = row.c[2].v;
        const [h, a] = row.c[1].v.split('-').map(Number);
        
        if (h > a) {
            teamStats[home].wins++;
            teamStats[home].history.push(3 + (h-a >= 3 ? 2 : 0));
        } else if (a > h) {
            teamStats[away].wins++;
            teamStats[away].history.push(3 + (a-h >= 3 ? 2 : 0));
        } else {
            teamStats[home].draws++; teamStats[away].draws++;
        }
    });

    let html = "";
    participants.forEach(p => {
        let pts = 0;
        p.teams.forEach(t => {
            let s = teamStats[t];
            pts += (s.wins * 3) + s.draws + s.history.reduce((a, b) => a + (b > 3 ? b - 3 : 0), 0);
            if (bonuses.knockoutQual.includes(t)) pts += 5;
            if (bonuses.quarterFinalists.includes(t)) pts += 10;
            if (bonuses.semiFinalists.includes(t)) pts += 15;
            if (bonuses.finalists.includes(t)) pts += 20;
            if (bonuses.champion === t) pts += 30; // Champion 30 pts
        });
        html += `<tr><td>1</td><td>${p.name}</td><td>${p.teams.map(t=>`<span class="team-tag">${t}</span>`).join('')}</td><td>-</td><td class="total-pts">${pts}</td></tr>`;
    });
    document.getElementById('leaderboard-rows').innerHTML = html;
};

window.onload = loadSheetsData;
</script>
</body>
</html>
